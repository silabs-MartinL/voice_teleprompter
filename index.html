<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Voice Teleprompter</title>
<script src="version.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="toolbar">
  <button id="helpBtn">Help</button>
  <button id="openBtn">Open</button>
  <input id="fileInput" type="file" accept=".txt,.md,text/plain,text/markdown" style="display:none" />
  <button id="editBtn">Edit</button>
  <button id="startBtn">Start</button>
  <button id="resetBtn">Reset</button>
  <button id="fontDownBtn">A−</button>
  <button id="fontUpBtn">A+</button>
  <button id="mirrorBtn">Mirror</button>
  <button id="flipBtn">Flip</button>
  <button id="eyeGapDownBtn">G−</button>
  <button id="eyeGapUpBtn">G+</button>
  <span id="status">Idle</span>
  <span id="debug">Waiting for: —</span>
</div>
<div id="stage"><div id="script"></div></div>
<div id="unsupported">This browser does not support the Web Speech API. Try Chrome. Keyboard controls still work.</div>
<div id="editorOverlay">
  <div id="editorPanel">
    <div id="editorBar">
      <strong>Edit</strong>
      <span class="spacer"></span>
      <button id="applyEditBtn">Apply</button>
      <button id="downloadScriptBtn">Download</button>
      <button id="closeEditBtn">Close</button>
    </div>
    <textarea id="scriptEditor" spellcheck="true"></textarea>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
